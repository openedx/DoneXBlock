[tox]
envlist = py{312}-django{42,52}, quality
requires = tox-uv>=1

[testenv]
runner = uv-venv-lock-runner
dependency_groups =
    django42: django42
    django52: test
allowlist_externals =
    make
commands =
    make test

[testenv:quality]
runner = uv-venv-lock-runner
dependency_groups = quality
allowlist_externals =
    make
commands =
    make quality
